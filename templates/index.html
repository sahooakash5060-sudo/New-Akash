<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #1e293b;
    }

    header h1 {
      font-size: 2rem;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h2 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .hero p {
      color: #94a3b8;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #1e293b;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>
  <h1>🚀 DevOps Portfolio</h1>
</header>

<section class="hero">
  <h2>Hello, I'm Akash 👨‍💻</h2>
  <p>DevOps Engineer | CI/CD | Docker | Automation</p>
</section>

<section class="projects">
  <div class="card">
    <h3>CI/CD Pipeline</h3>
    <p>Built using GitHub Actions & Docker</p>
  </div>

  <div class="card">
    <h3>Containerized App</h3>
    <p>Flask app deployed via Docker</p>
  </div>

  <div class="card">
    <h3>Automation</h3>
    <p>End-to-end deployment pipeline</p>
  </div>
</section>

<footer>
  <p>© 2026 Akash | DevOps Portfolio</p>
</footer>

</body>
</html>
